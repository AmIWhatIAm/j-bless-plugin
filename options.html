<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>J*bless Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell settings-shell">
      <h1>Settings</h1>
      <p class="subtle">Set up live commute calculations once for this browser profile.</p>
      <form id="settings-form">
        <label for="routes-api-key">Google Routes API key</label>
        <input id="routes-api-key" type="password" autocomplete="off" placeholder="AIza…" required />
        <p class="subtle">Enable Routes API in Google Cloud and restrict this key before saving it.</p>
        <button type="submit">Save key</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
